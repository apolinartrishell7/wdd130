<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dallin H. Oaks</title>

<style>

body {
    background-color: #FFECD7;
    font-family: Arial, Helvetica, sans-serif;

    display: flex;
    justify-content: center;
    align-items: center;

    height: 100vh;
    margin: 0;
}

.card {
    background-color: #008DB1;
    border: 5px solid #004E63;

    width: 320px;
    padding: 25px;

    border-radius: 25px;

    text-align: center;

    box-shadow: 0 0 15px rgba(0,0,0,.3);
}

h1 {
    color: white;
    margin-bottom: 10px;
}

.subtitle {
    color: #BEEFFF;
    font-size: 18px;
    margin-bottom: 20px;
}

img {
    width: 170px;

    border: 5px solid white;
}

ul {
    color: white;
    text-align: left;

    margin-top: 20px;
    margin-bottom: 20px;
}

.quote {
    color: #FFD783;

    font-family: "Brush Script MT", cursive;

    font-size: 24px;
}

</style>
</head>

<body>

<div class="card">

    <h1>Dallin H. Oaks</h1>

    <div class="subtitle">
        President of The Church of Jesus Christ of Latter-day Saints
    </div>

    <img src="images/oaks.webp" alt="Dallin H. Oaks">

    <ul>
        <li>Born: August 12, 1932</li>
        <li>Called as Apostle: April 7, 1984</li>
        <li>Became Prophet: October 14, 2025</li>
    </ul>

    <div class="quote">
        “Testimony is to know and to feel,<br>
    Conversion is to do and to become.”<br>
    </div>

</div>

</body>
</html>
