<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apostles Spotlight</title>

<style>

body{
background:#E8ECED;
font-family:Arial;
margin:0;
padding:30px;

display:flex;
justify-content:center;
}

.container{

width:850px;

background-image:url("images/christus.webp");

background-size:cover;

background-position:center;

border:5px solid black;

border-radius:30px;

padding:25px;

text-align:center;

color:white;
}

h1{

font-size:50px;

margin:0;

text-shadow:3px 3px 6px black;
}

h2{

margin:20px;

text-shadow:2px 2px 6px black;
}

.row{

display:flex;

justify-content:center;

gap:22px;

margin-bottom:28px;

flex-wrap:nowrap;
}

.card{
width:100px;
}

.card img{

width:90px;

height:90px;

object-fit:cover;

border-radius:50%;

border:6px solid white;

transition:.3s;
}

.card img:hover{

border-color:gold;

transform:scale(1.1);
}

</style>

</head>

<body>

<div class="container">

<h1>First Presidency</h1>

<div class="row">

<div class="card">
<img src="images/eyring.webp">
</div>

<div class="card">
<img src="images/oaks.webp">
</div>

<div class="card">
<img src="images/christofferson.webp">
</div>

</div>

<h2>Quorum of the Twelve Apostles</h2>

<div class="row">

<div class="card"><img src="images/cook.webp"></div>
<div class="card"><img src="images/bednar.webp"></div>
<div class="card"><img src="images/gong.webp"></div>
<div class="card"><img src="images/rasband.webp"></div>

</div>

<div class="row">

<div class="card"><img src="images/renlund.webp"></div>
<div class="card"><img src="images/stevenson.webp"></div>
<div class="card"><img src="images/kearon.webp"></div>
<div class="card"><img src="images/uchtdorf.webp"></div>

</div>

<div class="row">

<div class="card"><img src="images/soares.webp"></div>
<div class="card"><img src="images/holland.webp"></div>
<div class="card"><img src="images/anderson.webp"></div>
<div class="card"><img src="images/causse.webp"></div>

</div>

</div>

</body>
</html>
